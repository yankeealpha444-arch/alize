name: Stable Video MVP Build

on:
  push:
    branches: [main]

jobs:
  stable-video-mvp-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vision-clip-hub/package-lock.json

      - name: Install dependencies
        working-directory: vision-clip-hub
        run: npm install

      - name: Build stable app
        working-directory: vision-clip-hub
        run: npm run build
